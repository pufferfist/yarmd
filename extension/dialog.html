<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>yarmd - Download</title>
    <style>
        body {
            font-family: Segoe UI, sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 12px;
            background: #1e1e1e;
            color: #e0e0e0;
        }
        h3 { margin: 0 0 4px 0; font-size: 13px; color: #9cdcfe; }
        .url-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 6px 8px;
            border-radius: 3px;
            word-break: break-all;
            max-height: 3em;
            overflow-y: auto;
            font-family: Consolas, monospace;
            font-size: 12px;
        }
        .path-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 6px 8px;
            border-radius: 3px;
            font-family: Consolas, monospace;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .path-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-family: Consolas, monospace;
            font-size: 12px;
            outline: none;
        }
        .path-box button {
            background: #0e639c;
            border: none;
            color: white;
            padding: 2px 8px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 11px;
        }
        #dirs {
            list-style: none;
            padding: 0;
            margin: 0;
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 3px;
            height: 260px;
            overflow-y: auto;
        }
        #dirs li {
            padding: 4px 10px;
            cursor: pointer;
            border-bottom: 1px solid #2d2d2d;
            font-family: Consolas, monospace;
            font-size: 12px;
        }
        #dirs li:hover { background: #094771; }
        #dirs li.parent { color: #dcdcaa; }
        .row { margin: 8px 0; }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .controls label { display: flex; align-items: center; gap: 6px; }
        .controls .buttons { display: flex; gap: 8px; }
        button.primary {
            background: #0e639c;
            border: none;
            color: white;
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 12px;
        }
        button.primary:hover { background: #1177bb; }
        button.secondary {
            background: #3a3d41;
            border: none;
            color: white;
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 12px;
        }
        button.secondary:hover { background: #45494e; }
        button:disabled { opacity: 0.5; cursor: default; }
        #status { margin-top: 8px; min-height: 1.2em; color: #4ec9b0; font-size: 12px; }
        #status.error { color: #f48771; }
    </style>
</head>
<body>
    <div class="row">
        <h3>URL</h3>
        <div class="url-box" id="url">Loading...</div>
    </div>
    <div class="row">
        <h3>Download to</h3>
        <div class="path-box">
            <input type="text" id="current" placeholder="(drives)" />
            <button id="go">Go</button>
        </div>
    </div>
    <div class="row">
        <ul id="dirs"></ul>
    </div>
    <div class="controls">
        <label><input type="checkbox" id="shutdown"> Shutdown when done</label>
        <div class="buttons">
            <button class="secondary" id="cancel">Cancel</button>
            <button class="primary" id="download">Download</button>
        </div>
    </div>
    <div id="status"></div>
    <script src="dialog.js"></script>
</body>
</html>
